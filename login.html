<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | IOE-HUB</title>

    <link rel="stylesheet" href="static/style.css">
</head>

<body>

    <nav>
        <div class="logo">IOE-HUB</div>

        <ul>
            <li><a href="index.html">Home</a></li>

            <li>
                <a href="https://digitalnce.com/IOE_Questions/1stsem.php" target="_blank">
                    Past Questions
                </a>
            </li>

            <li>
                <a href="https://ioe.tu.edu.np/pages/bachelor-2594" target="_blank">
                    Syllabus
                </a>
            </li>

            <li>
                <a href="https://tu.edu.np/notices" target="_blank">
                    Notices
                </a>
            </li>

            <li><a href="about.html">About</a></li>
        </ul>

        <button class="login-btn">Login</button>
    </nav>

    <section class="login-section">

        <div class="login-card">

            <h2>Welcome Back</h2>

            <p>Login to continue to IOE-HUB</p>

            <form>

                <label>Email</label>

                <input
                    type="email"
                    placeholder="Enter your email"
                    required
                >

                <label>Password</label>

                <input
                    type="password"
                    placeholder="Enter your password"
                    required
                >

                <button type="submit" class="submit-btn">
                    Login
                </button>

            </form>

            <div class="login-links">

                <a href="#">Forgot Password?</a>

                <p>
                    Don't have an account?
                    <a href="signup.html">Sign Up</a>
                </p>

            </div>

        </div>

    </section>

</body>

</html>
