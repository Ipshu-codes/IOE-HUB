<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | IOE-HUB</title>

    <link rel="stylesheet" href="static/style.css">
</head>

<body>

    <nav>

        <div class="logo">IOE-HUB</div>

        <ul>

            <li><a href="index.html">Home</a></li>

            <li>
                <a href="https://digitalnce.com/IOE_Questions/1stsem.php" target="_blank">
                    Past Questions
                </a>
            </li>

            <li>
                <a href="https://ioe.tu.edu.np/pages/bachelor-2594" target="_blank">
                    Syllabus
                </a>
            </li>

            <li>
                <a href="https://tu.edu.np/notices" target="_blank">
                    Notices
                </a>
            </li>

            <li><a href="about.html">About</a></li>

        </ul>

        <a href="login.html" class="login-btn">
            Login
        </a>

    </nav>

    <section class="login-section">

        <div class="login-card">

            <h2>Create Account</h2>

            <p>Join IOE-HUB and access academic resources.</p>

            <form id="signupForm">

                <label>Full Name</label>

                <input
                    type="text"
                    id="fullname"
                    placeholder="Enter your full name"
                    required
                >

                <label>Email</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required
                >

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Create a password"
                    required
                >

                <label>Confirm Password</label>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm your password"
                    required
                >

                <button type="submit" class="submit-btn">
                    Create Account
                </button>

            </form>

            <div class="login-links">

                <p>
                    Already have an account?
                    <a href="login.html">Login</a>
                </p>

            </div>

        </div>

    </section>

    <script src="static/js/signup.js"></script>

</body>

</html>
